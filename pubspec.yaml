name: private_messenger
description: A private messenger with offline mesh support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Matrix SDK (ядро мессенджера)
  matrix: ^0.22.0

  # Bridgefy для офлайн mesh (требует ключ API)
  # Если Bridgefy не подключится, можно будет закомментировать эту строку
  # bridgefy: ^1.0.0 

  # Хранилище данных (hive уже транзитивная зависимость matrix,
  # но hive_flutter нужен для Hive.initFlutter() если потребуется)
  # hive_flutter: ^1.1.0
  
  # Утилиты
  path_provider: ^2.1.1
  path: ^1.9.0
  cupertino_icons: ^1.0.6
  http: ^1.2.0

  # Медиа
  image_picker: ^1.0.7
  file_picker: ^8.0.0

  # Аудио (запись и воспроизведение)
  record: ^5.1.0
  just_audio: ^0.9.37
  audioplayers: ^5.2.1

  # Видеозвонки (WebRTC)
  # Версия ^0.10.0 мигрировала на dart:js_interop, исправляет JSArray ошибки на Dart 3.2+
  flutter_webrtc: ^0.10.0

  # Уведомления
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
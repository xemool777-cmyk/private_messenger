server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;

    # Кэширование статики (Flutter генерирует файлы с хэшами)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WASM файлы — правильный MIME type
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        add_header Cache-Control "public, immutable";
    }

    # JS файлы
    location ~* \.js$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # config.js НЕ кэшируем — генерируется при запуске контейнера
    location = /config.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Flutter SPA — все неизвестные роуты → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование Matrix API к homeserver
    # Это решает CORS проблемы — клиент обращается к тому же домену
    location /_matrix/ {
        proxy_pass https://xemooll.ru/_matrix/;
        proxy_set_header Host xemooll.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для long-polling (/sync может висеть 30 сек)
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;

        # Буферизация — отключаем для /sync streaming
        proxy_buffering off;
    }

    # Проксирование .well-known для Matrix
    location /.well-known/ {
        proxy_pass https://xemooll.ru/.well-known/;
        proxy_set_header Host xemooll.ru;
    }

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

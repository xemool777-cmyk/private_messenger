services:
  # ============================================
  # Веб-клиент Private Messenger (Flutter web + nginx)
  # ============================================
  messenger-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HOMESERVER_URL: "https://xemooll.ru"
    container_name: messenger-web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - HOMESERVER_URL=https://xemooll.ru
    # Если нужен SSL — используйте reverse-proxy (Caddy/nginx-proxy) или
    # подключите сети к существующему nginx с сертификатами

  # ============================================
  # Альтернатива: Caddy с авто-SSL (Let's Encrypt)
  # Раскомментируйте, если хотите автоматические SSL-сертификаты
  # ============================================
